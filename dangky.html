<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin đăng ký</title>
    <style>
        /* --- 1. Reset & Cài đặt chung --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #e6f2ff; /* Màu nền xanh nhạt giống trong ảnh */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- 2. Khung Form chính --- */
        .registration-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 550px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid #ddd;
        }

        /* --- 3. Tiêu đề màu xanh lá --- */
        .form-header {
            background-color: #8cb443; /* Màu xanh lá đặc trưng */
            color: #000000;
            text-align: center;
            padding: 15px 0;
            font-size: 20px;
            font-weight: bold;
        }

        /* --- 4. Nội dung Form --- */
        .form-body {
            padding: 25px;
        }

        /* Hàng chứa label và input */
        .form-group {
            display: flex;
            margin-bottom: 15px;
            align-items: center;
        }

        /* Cột bên trái: Nhãn văn bản (Họ tên, Ngày sinh...) */
        .form-label {
            width: 120px;
            font-size: 14px;
            color: #333;
            flex-shrink: 0;
        }

        /* Cột bên phải: Các ô nhập liệu */
        .form-control-wrapper {
            flex-grow: 1;
        }

        /* --- 5. Style các ô nhập liệu dạng gạch chân --- */
        .input-underline {
            width: 100%;
            border: none;
            border-bottom: 1px solid #777; /* Đường gạch chân */
            padding: 4px 0;
            font-size: 14px;
            outline: none;
            background: transparent;
        }

        /* Các ô chọn đặc biệt không dùng gạch chân toàn bộ */
        .input-radio-group, .input-checkbox-group {
            display: flex;
            gap: 15px;
            font-size: 14px;
        }

        /* Ô nhập mô tả sơ lược (Textarea) */
        textarea.input-underline {
            border: 1px solid #aaa; /* Ô mô tả trong ảnh có khung viền đầy đủ */
            border-radius: 4px;
            padding: 8px;
            height: 100px;
            resize: none;
        }

        /* --- 6. Các nút bấm (Hủy bỏ / Đăng ký) --- */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
        }
        .btn {
            background-color: #8cb443;
            color: #000;
            border: none;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="registration-card">
        <div class="form-header">Thông tin đăng ký</div>
        
        <form class="form-body">
            
            <div class="form-group">
                <label class="form-label">Họ tên:</label>
                <div class="form-control-wrapper">
                    <input type="text" class="input-underline" placeholder="Nhập họ tên">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Ngày sinh:</label>
                <div class="form-control-wrapper">
                    <input type="date" class="input-underline">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Giới tính:</label>
                <div class="form-control-wrapper input-radio-group">
                    <label><input type="radio" name="gender"> Nam</label>
                    <label><input type="radio" name="gender"> Nữ</label>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Địa chỉ:</label>
                <div class="form-control-wrapper">
                    <input type="text" class="input-underline" placeholder="Nhập địa chỉ">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">MSSV:</label>
                <div class="form-wrapper-column form-control-wrapper">
                    <input type="text" class="input-underline" placeholder="Nhập mã số sinh viên">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Lớp:</label>
                <div class="form-control-wrapper">
                    <select class="input-underline">
                        <option>DA25TTC</option>
                        </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Số điện thoại:</label>
                <div class="form-control-wrapper">
                    <input type="tel" class="input-underline" placeholder="Nhập số điện thoại">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Email:</label>
                <div class="form-control-wrapper">
                    <input type="email" class="input-underline" placeholder="Nhập email">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Ảnh đại diện:</label>
                <div class="form-control-wrapper">
                    <input type="file">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Sở trường:</label>
                <div class="form-control-wrapper input-checkbox-group">
                    <label><input type="checkbox"> Thiết kế web</label>
                    <label><input type="checkbox"> Lập trình web</label>
                    <label><input type="checkbox"> Thành thạo tiếng Trung</label>
                </div>
            </div>

            <div class="form-group" style="align-items: flex-start; flex-direction: column;">
                <label class="form-label" style="margin-bottom: 5px;">Mô tả sơ lược:</label>
                <div class="form-control-wrapper" style="width: 100%;">
                    <textarea class="input-underline"></textarea>
                </div>
            </div>

            <div class="btn-group">
                <button type="button" class="btn">Hủy bỏ</button>
                <button type="submit" class="btn">Đăng ký</button>
            </div>

        </form>
    </div>

</body>
</html>
