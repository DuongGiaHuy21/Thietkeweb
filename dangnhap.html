<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
  <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: #ffffff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo-tvu {
            width: 120px;
            margin-bottom: 1rem;
        }

        h2 {
            color: #00558d; 
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .input-group {
            text-align: left;
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box; 
        }

        input:focus {
            outline: none;
            border-color: #00558d;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #00558d;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #003d66;
        }

        .footer-links {
            margin-top: 1rem;
            font-size: 0.85rem;
        }

        .footer-links a {
            color: #00558d;
            text-decoration: none;
        }
    </style>
<body>
<div class="login-card">
    <img src="https://cdn.haitrieu.com/wp-content/uploads/2021/12/Logo-DH-Tra-Vinh-TVU.png" alt="TVU Logo" class="logo-tvu">
    
    <h2>Đăng nhập</h2>
    
    <form action="#">
        <div class="input-group">
            <label for="username">Tên đăng nhập</label>
            <input type="text" id="username" placeholder="name user/email/number phone" required>
        </div>
        
        <div class="input-group">
            <label for="password">Mật khẩu</label>
            <input type="password" id="password" placeholder="Nhập mật khẩu" required>
        </div>
        
        <button type="submit">ĐĂNG NHẬP</button>
    </form>

    <div class="footer-links">
        <a href="#">Quên mật khẩu?</a> | <a href="#">Hỗ trợ kỹ thuật</a> 
        <p><a href="dangky.html">Đăng ký</a></p><a href="index.html">Trang chủ</a>
    </div>
</div>

</body>
</html>
